# strfry.conf — Apache vhost for relay.testls.bit
# TLS termination on :443, with three behaviours by request shape:
#   1) Upgrade: websocket            -> ws://127.0.0.1:7777 (strfry, mod_proxy_wstunnel)
#   2) Accept: application/nostr+json -> http://127.0.0.1:7777/ (strfry NIP-11)
#   3) anything else                  -> static SPA in /var/www/relay-ui/
# Cert chain is DANE-TA pinned via Namecoin d/testls map.relay.tls.

<VirtualHost *:80>
    ServerName relay.testls.bit
    # No auto redirect to 443 — that would drop the WS Upgrade header.
    RewriteEngine On
    RewriteRule ^ - [R=403,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName relay.testls.bit

    Protocols h2 http/1.1

    SSLEngine on
    SSLCertificateFile      /etc/strfry/tls/chain.pem
    SSLCertificateKeyFile   /etc/strfry/tls/key.pem

    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite          HIGH:!aNULL:!MD5
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    DocumentRoot /var/www/relay-ui

    RewriteEngine On

    # 1) WebSocket upgrade -> wstunnel to strfry.  (Server-context: REQUEST_FILENAME
    #    is the URI path, but we don't gate on file existence here.)
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*)  ws://127.0.0.1:7777/$1  [P,L]

    # 2) NIP-11 (Accept: application/nostr+json) -> strfry HTTP.
    RewriteCond %{HTTP:Accept} application/nostr\+json [NC]
    RewriteRule ^/?(.*)  http://127.0.0.1:7777/$1  [P,L]

    <Directory "/var/www/relay-ui">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html

        # 3) SPA fallback: anything that isn't an existing file/dir -> index.html.
        #    In <Directory> context, REQUEST_FILENAME is the full filesystem path,
        #    so -f / -d work correctly here (unlike server-context above).
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    # Proxy-only directives (apply to the WS/NIP-11 upstream):
    ProxyRequests       Off
    ProxyPreserveHost   On
    ProxyPassReverse    /  http://127.0.0.1:7777/
    ProxyTimeout        600
    Timeout             600

    RemoteIPHeader      X-Forwarded-For
    RequestHeader set   X-Forwarded-Proto "https"

    # Light caching for static assets.
    <FilesMatch "\.(css|js|svg|png|jpg|jpeg|webp|ico)$">
        Header set Cache-Control "public, max-age=300"
    </FilesMatch>
    <FilesMatch "\.html$">
        Header set Cache-Control "no-cache"
    </FilesMatch>

    ErrorLog   ${APACHE_LOG_DIR}/strfry-error.log
    CustomLog  ${APACHE_LOG_DIR}/strfry-access.log combined
</VirtualHost>
